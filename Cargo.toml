[package]
name = "storm"
version = "2026.7.0"
edition = "2021"
description = "storm - retro terminal screensaver effect"
autobins = false

[[bin]]
name = "storm"
path = "src/screensaver_shim.rs"

[dependencies]
library = { git = "https://github.com/local76/library.git", branch = "main", features = ["screensaver-runtime"] }

[build-dependencies]
library = { git = "https://github.com/local76/library.git", branch = "main" }
embed-resource = "2"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

[package.metadata.deb]
name = "scene-storm"
maintainer = "Screensavers Developer <dev@local76.org>"
extended-description = "Screensaver effect (storm) part of the screensavers collection."
depends = "libc6, xterm"
section = "utils"
priority = "optional"
assets = [
    ["target/release/storm", "usr/libexec/screensaver-shims/storm", "755"],
    ["assets/scene-storm.desktop", "usr/share/applications/scene-storm.desktop", "644"],
    ["assets/scene-storm.xml", "usr/share/xscreensaver/config/scene-storm.xml", "644"]
]

[package.metadata.generate-rpm]
name = "scene-storm"
version = "2026.7.0"
release = "1"
arch = "x86_64"
summary = "storm - retro terminal screensaver effect"
description = "Screensaver effect (storm) part of the screensavers collection."
license = "MIT"
assets = [
    { source = "target/release/storm", dest = "/usr/libexec/screensaver-shims/storm", mode = "755" },
    { source = "assets/scene-storm.desktop", dest = "/usr/share/applications/scene-storm.desktop", mode = "644" },
    { source = "assets/scene-storm.xml", dest = "/usr/share/xscreensaver/config/scene-storm.xml", mode = "644" }
]